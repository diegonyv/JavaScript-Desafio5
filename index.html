<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style/style.css" />
    <title>Desafío 5</title>
  </head>
  <body>
    <div class="toDoList">
      <div class="toDoListTop">
        <h1>To Do List</h1>
        <p>Nueva Tarea</p>
        <div class="inputDiv">
          <input id="input" type="text" /> <button class="btnAdd" id="addTask">Agregar</button>
        </div>
      </div>

      <div class="toDoListBottom">
        <div class="tasksIn">
          <p id="total"></p>
          <p id="realizadas">Realizadas:</p>
        </div>

        <div class="tasksList">
          <div class="tasksTitle">
            <p><strong>ID</strong></p>
            <p><strong>Tarea</strong></p>
          </div>
          <div class="tasksBlock">
            <ul id="tasksListIn"></ul>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script src="./assets/script/script.js"></script>
</html>
